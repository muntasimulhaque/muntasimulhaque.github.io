<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20width='100'%20height='100'%20rx='20'%20fill='%231a73e8'/%3E%3Ctext%20x='50'%20y='72'%20font-size='60'%20font-weight='600'%20font-family='Arial,sans-serif'%20fill='white'%20text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
  {% seo title=false %}
  {% feed_meta %}
</head>
<body class="layout-{{ page.layout | default: 'page' }}">
  <div class="site-header">
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    </button>
    <a href="/" class="site-title">Muntasim Ul Haque</a>
    <div class="site-social-links">
      {% for link in site.social %}
        <a href="{{ link.url }}" target="_blank" rel="noopener noreferrer">{{ link.title }}</a>
        {% unless forloop.last %} · {% endunless %}
      {% endfor %}
    </div>
  </div>
  
  <main>
    {{ content }}
  </main>

  <script>
    (function() {
      var btn = document.getElementById('theme-toggle');
      function current() {
        var t = document.documentElement.getAttribute('data-theme');
        if (t) return t;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      function setIcon() { btn.classList.toggle('is-dark', current() === 'dark'); }
      btn.addEventListener('click', function() {
        var next = current() === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        setIcon();
      });
      setIcon();
    })();
  </script>
</body>
</html>
